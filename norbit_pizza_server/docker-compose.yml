services:
  db:
    image: mysql:8.0
    container_name: norbit_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-norbit_pizza}
      MYSQL_USER: ${MYSQL_USER:-norbit}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-norbitpassword}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: norbit_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${MYSQL_USER:-norbit}
      DB_PASSWORD: ${MYSQL_PASSWORD:-norbitpassword}
      DB_NAME: ${MYSQL_DATABASE:-norbit_pizza}
      PORT: 3000
      STORAGE: blob
    ports:
      - "3000:3000"
    volumes:
      - ./:/usr/src/app:rw
      - /usr/src/app/node_modules
    command: npm run dev

volumes:
  db_data:
